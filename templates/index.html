<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ishita's Book Corner ☕</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Cozy soft baby pink gradient background */
            background: linear-gradient(135deg, #fff1f2, #ffe4e6); 
            color: #4c1d95; /* Deep, readable plum/berry color for text */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .chat-container {
            width: 440px;
            height: 620px;
            /* Pastel glassmorphism style container */
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(12px);
            border: 2px solid #fecdd3; /* Soft pink border */
            border-radius: 24px; /* Extra round and cute */
            display: flex;
            flex-direction: column;
            box-shadow: 0 12px 40px rgba(251, 113, 133, 0.15); /* Soft rosy shadow */
            overflow: hidden;
        }
        .chat-header {
            padding: 20px;
            text-align: center;
            background: #ffe4e6;
            border-bottom: 2px solid #fecdd3;
            font-size: 1.25rem;
            font-weight: bold;
            color: #db2777; /* Deep pink */
            letter-spacing: 0.5px;
        }
        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            /* Light, subtle grid pattern to look like notebook paper */
            background-image: linear-gradient(rgba(254, 205, 211, 0.15) 1px, transparent 1px);
            background-size: 100% 24px;
        }
        .message {
            max-width: 78%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.45;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
        }
        .user-message {
            background: #f472b6; /* Cute bubblegum pink */
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .bot-message {
            background: white;
            color: #4c1d95;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid #ffe4e6;
        }
        .input-area {
            padding: 20px;
            display: flex;
            gap: 12px;
            background: rgba(255, 255, 255, 0.8);
            border-top: 2px solid #fecdd3;
        }
        input {
            flex: 1;
            padding: 14px;
            background: white;
            border: 2px solid #fecdd3;
            border-radius: 14px;
            color: #4c1d95;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s ease;
        }
        input:focus {
            border-color: #f472b6;
            box-shadow: 0 0 8px rgba(244, 114, 182, 0.3);
        }
        button {
            padding: 12px 22px;
            background: #db2777;
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(219, 39, 119, 0.2);
        }
        button:hover {
            background: #be185d;
            transform: translateY(-1px);
        }
        button:active {
            transform: translateY(1px);
        }
        /* Custom cute scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #fecdd3;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #f472b6;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">🌸 Ishita's Book Corner 📖</div>
    <div class="chat-box" id="chatBox">
        <div class="message bot-message">Hey! I was just organizing my bookshelf 🌸 What are we reading today? Give me a genre you're in the mood for, or tell me the last book that completely blew your mind! ✨</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="💖 Talk books with Ishita..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send ✨</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');

    function appendMessage(text, className) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${className}`;
        messageDiv.innerText = text;
        chatBox.appendChild(messageDiv);
        chatBox.scrollTop = chatBox.scrollHeight; 
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, 'user-message');
        userInput.value = '';

        try {
            const response = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            const data = await response.json();
            
            if (data.response) {
                appendMessage(data.response, 'bot-message');
            } else {
                appendMessage("Oh no, I think my thoughts got scrambled! Let's try that again 🌸", 'bot-message');
            }
        } catch (error) {
            appendMessage("Ah, looks like my bookshelf fell over! Give me a second to reconnect 💕", 'bot-message');
        }
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }
</script>
</body>
</html>
